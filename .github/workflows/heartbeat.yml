name: Heartbeat
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.MARKETING_ARCHITECT_PAT }}
      - name: Commit heartbeat
        env:
          GIT_PAT: ${{ secrets.MARKETING_ARCHITECT_PAT }}
        run: |
          git config user.name "heartbeat-bot"
          git config user.email "bot@rule34.ink"
          git commit --allow-empty -m "chore: heartbeat [skip ci]"
          git config --unset-all http.https://github.com/.extraheader || true
          git push "https://x-access-token:\${GIT_PAT}@github.com/\${GITHUB_REPOSITORY}.git" HEAD:\${GITHUB_REF_NAME}
